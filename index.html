<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXUS AI</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#050a0e;color:#c8dde8;font-family:Arial,sans-serif;display:flex;flex-direction:column;height:100dvh}.hdr{background:#0a1520;padding:12px 16px;border-bottom:1px solid rgba(0,212,255,.2)}.hdr h1{color:#00d4ff;font-size:18px;letter-spacing:2px}.hdr p{color:#3a5a6a;font-size:10px;margin-top:2px}#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}.user{align-self:flex-end;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.25);padding:10px 14px;border-radius:16px 4px 16px 16px;max-width:82%;font-size:14px;line-height:1.6;word-break:break-word}.ai{align-self:flex-start;background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.2);padding:10px 14px;border-radius:4px 16px 16px 16px;max-width:85%;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word}.inp{background:#0a1520;border-top:1px solid rgba(0,212,255,.2);padding:10px 12px;display:flex;gap:8px;padding-bottom:max(10px,env(safe-area-inset-bottom))}#box{flex:1;background:#050a0e;border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:10px 16px;color:#c8dde8;font-size:15px;outline:none}#box:focus{border-color:#00d4ff}#btn{background:rgba(0,212,255,.2);border:1px solid #00d4ff;border-radius:50%;width:42px;height:42px;color:#00d4ff;font-size:18px;cursor:pointer}#btn:disabled{opacity:.4}.setup{position:fixed;inset:0;background:rgba(5,10,14,.97);display:flex;align-items:center;justify-content:center;z-index:100}.card{background:#0a1520;border:1px solid rgba(0,212,255,.3);border-radius:16px;padding:28px;width:90%;max-width:380px;text-align:center}.card h2{color:#00d4ff;font-size:20px;letter-spacing:3px;margin-bottom:8px}.card p{color:#5a7a8a;font-size:13px;line-height:1.6;margin-bottom:20px}.card input{width:100%;background:#050a0e;border:1px solid rgba(0,212,255,.3);border-radius:8px;padding:12px;color:#c8dde8;font-size:13px;font-family:monospace;outline:none;margin-bottom:12px}.card button{width:100%;padding:12px;background:rgba(0,212,255,.2);border:1px solid #00d4ff;border-radius:8px;color:#00d4ff;font-size:14px;cursor:pointer}.card a{color:#00ff9d;font-size:12px;display:block;margin-top:12px;text-decoration:none}</style>
</head><body>
<div class="setup" id="setup">
<div class="card">
<div style="font-size:48px;margin-bottom:12px">&#9889;</div>
<h2>NEXUS AI</h2>
<p>Groq API Key ထည့်ပါ<br>မြန်မာ+English အကုန်သိတဲ့ AI</p>
<input type="password" id="key" placeholder="gsk_ နဲ့ စတဲ့ key"/>
<button onclick="go()">START NEXUS AI</button>
<a href="https://console.groq.com" target="_blank">API Key မရှိဘူးလား? ဒီမှာ အခမဲ့ ရယူ</a>
</div></div>
<div class="hdr"><h1>&#9889; NEXUS AI</h1><p>Networking · CyberSec · GED · English · Coding</p></div>
<div id="msgs"><div class="ai">မင်္ဂလာပါ! ငါ NEXUS AI ပါ။ မေးချင်တာ မေးပါ။ Hello! Ask me anything!</div></div>
<div class="inp">
<input id="box" type="text" placeholder="မေးချင်တာ ရိုက်ပါ..." onkeydown="if(event.key==='Enter')send()"/>
<button id="btn" onclick="send()">&#10148;</button>
</div>
<script>
var K='',hist=[],busy=false;
var SYS='You are NEXUS AI. Bilingual Myanmar/English auto-detect. Expert: Networking, Cybersecurity (ethical), GED, English, Coding. Be detailed.';
function go(){var k=document.getElementById('key').value.trim();if(!k.startsWith('gsk_')){alert('gsk_ နဲ့ စတဲ့ key ထည့်ပါ');return;}K=k;document.getElementById('setup').style.display='none';}
async function send(){
if(busy)return;                                                              var b=document.getElementById('box'),t=b.value.trim();
if(!t||!K)return;
busy=true;document.getElementById('btn').disabled=true;b.value='';
var m=document.getElementById('msgs');
var u=document.createElement('div');u.className='user';u.textContent=t;m.appendChild(u);
var td=document.createElement('div');td.className='ai';td.id='td';td.textContent='တွေးနေသည်...';m.appendChild(td);
m.scrollTop=m.scrollHeight;
hist.push({role:'user',content:t});
try{
var r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+K},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:SYS}].concat(hist),max_tokens:2048,temperature:0.7})});
var d=await r.json();
document.getElementById('td').remove();
if(d.error){hist.pop();var e=document.createElement('div');e.className='ai';e.textContent='Error: '+d.error.message;m.appendChild(e);}
else{var rep=d.choices[0].message.content;hist.push({role:'assistant',content:rep});var a=document.createElement('div');a.className='ai';a.textContent=rep;m.appendChild(a);}
}catch(ex){document.getElementById('td')?.remove();hist.pop();var x=document.createElement('div');x.className='ai';x.textContent='Error: '+ex.message;m.appendChild(x);}
busy=false;document.getElementById('btn').disabled=false;m.scrollTop=m.scrollHeight;b.focus();
}
</script>
</body></html>
